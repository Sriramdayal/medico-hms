# Medico HMS — Render Deployment Blueprint
# ---------------------------------------------------------------------------

services:
  # Web Service (Django App)
  - type: web
    name: medico-hms
    env: python
    buildCommand: "cd backend && pip install -r requirements/prod.txt && DJANGO_SETTINGS_MODULE=medico.settings.prod python manage.py collectstatic --noinput && DJANGO_SETTINGS_MODULE=medico.settings.prod python manage.py migrate"
    startCommand: "cd backend && gunicorn medico.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: medico.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: medico-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: medico-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        sync: false # Set manually in Render dashboard
      - key: ALLOWED_HOSTS
        value: medico-hms.onrender.com
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: medico-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: medico-redis
          property: connectionString

  # Background Worker (Celery)
  - type: worker
    name: medico-worker
    env: python
    buildCommand: "cd backend && pip install -r requirements/prod.txt"
    startCommand: "cd backend && celery -A medico worker --loglevel=info --concurrency=2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: medico.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: medico-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: medico-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: medico-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: medico-db
          property: connectionString

# Infrastructure
databases:
  - name: medico-db
    databaseName: medico
    user: medico_user
    plan: free # Change to 'standard' for production

redis:
  - name: medico-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
