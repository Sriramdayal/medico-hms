# ===========================================================================
# Medico HMS — Docker Compose (Development)
# ===========================================================================
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f web    # Follow Django logs
#   docker compose exec web python manage.py createsuperuser
#
# ===========================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16 — Primary database
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: medico-db
    environment:
      POSTGRES_DB: medico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis 7 — Cache, session store, Celery broker
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: medico-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Django Web Application
  # --------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: medico-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=medico.settings.dev
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Celery Worker
  # --------------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: medico-celery-worker
    command: celery -A medico worker -l info --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=medico.settings.dev
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Celery Beat (Periodic Tasks)
  # --------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: medico-celery-beat
    command: celery -A medico beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=medico.settings.dev
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
