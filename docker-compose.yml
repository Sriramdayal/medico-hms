# ===========================================================================
# Medico HMS — Docker Compose (Development)
# ===========================================================================
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f web    # Follow Django logs
#   docker compose exec web python manage.py createsuperuser
#
# ===========================================================================

services:
  # --------------------------------------------------------------------------
  # MongoDB 7 — Primary database (replica set for transactions)
  # --------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: medico-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: >
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongo:27017'}]}).ok }"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis 7 — Cache, session store, Celery broker
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: medico-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Django Web Application
  # --------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: medico-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=medico.settings.dev
      - MONGODB_URI=mongodb://mongo:27017/medico?replicaSet=rs0&directConnection=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Celery Worker
  # --------------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: medico-celery-worker
    command: celery -A medico worker -l info --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=medico.settings.dev
      - MONGODB_URI=mongodb://mongo:27017/medico?replicaSet=rs0&directConnection=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Celery Beat (Periodic Tasks)
  # --------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: medico-celery-beat
    command: celery -A medico beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=medico.settings.dev
      - MONGODB_URI=mongodb://mongo:27017/medico?replicaSet=rs0&directConnection=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
